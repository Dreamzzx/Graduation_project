<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能视频分析系统 - 登录</title>
    <style>
        :root {
            --bg: #0f0f12;
            --bg-raised: #1a1a1f;
            --bg-surface: #242429;
            --bg-input: #141418;
            --border: #2a2a32;
            --border-focus: #3d3d48;
            --text: #e8e8ec;
            --text-dim: #a0a0a8;
            --text-muted: #606068;
            --accent: #d4a84b;
            --accent-hover: #e6b85c;
            --accent-glow: rgba(212, 168, 75, 0.15);
            --red: #c45c5c;
            --green: #5ca868;
            --radius: 6px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 14px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(212, 168, 75, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(90, 130, 180, 0.02) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(212, 168, 75, 0.01) 0%, transparent 70%);
            pointer-events: none;
        }

        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .brand {
            text-align: center;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--accent) 0%, #b8923a 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(212, 168, 75, 0.2);
        }

        .brand-icon svg {
            width: 28px;
            height: 28px;
            fill: var(--bg);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .brand h1 span {
            color: var(--accent);
        }

        .brand p {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 400;
        }

        .login-container {
            background: var(--bg-raised);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 360px;
            border: 1px solid var(--border);
            box-shadow: 
                0 4px 24px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        .tabs {
            display: flex;
            margin-bottom: 28px;
            background: var(--bg-surface);
            border-radius: var(--radius);
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 10px 16px;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius);
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-dim);
        }

        .tab.active {
            color: var(--text);
            background: var(--bg-raised);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
            transition: fill 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input:focus + svg,
        .input-wrapper:focus-within svg {
            fill: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent) 0%, #c49a3a 100%);
            color: var(--bg);
            box-shadow: 0 4px 16px rgba(212, 168, 75, 0.25);
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(212, 168, 75, 0.35);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: var(--radius);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            animation: toastIn 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        }

        .toast.success {
            background: var(--green);
        }

        .toast.error {
            background: var(--red);
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .footer-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="login-wrapper">
        <div class="brand">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                </svg>
            </div>
            <h1>智能<span>视频分析</span></h1>
            <p>Intelligent Video Analysis System</p>
        </div>

        <div class="login-container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
            </div>

            <div class="form-panel active" id="loginPanel">
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="loginPassword" placeholder="请输入密码" required>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="loginBtn">登录</button>
                </form>
            </div>

            <div class="form-panel" id="registerPanel">
                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <input type="text" id="regUsername" placeholder="至少3个字符" required minlength="3">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="regPassword" placeholder="至少6个字符" required minlength="6">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <div class="input-wrapper">
                            <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                            </svg>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="registerBtn">注册</button>
                </form>
            </div>
        </div>
        
        <div class="footer-text">
            Intelligent Video Analysis System v1.0
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
            if (tab === 'login') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('loginPanel').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('registerPanel').classList.add('active');
            }
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            if (!username || !password) {
                showToast('请填写用户名和密码', 'error');
                return;
            }
            btn.disabled = true;
            btn.textContent = '登录中...';
            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => { window.location.href = '/'; }, 500);
                } else {
                    showToast(data.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            })
            .catch(error => {
                showToast('登录失败: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '登录';
            });
        }

        function handleRegister(event) {
            event.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const btn = document.getElementById('registerBtn');
            if (!username || !password || !confirmPassword) {
                showToast('请填写所有字段', 'error');
                return;
            }
            if (password !== confirmPassword) {
                showToast('两次密码输入不一致', 'error');
                return;
            }
            btn.disabled = true;
            btn.textContent = '注册中...';
            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, confirm_password: confirmPassword })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    showToast(data.message, 'success');
                    setTimeout(() => {
                        switchTab('login');
                        document.getElementById('loginUsername').value = username;
                    }, 1000);
                } else {
                    showToast(data.message, 'error');
                }
                btn.disabled = false;
                btn.textContent = '注册';
            })
            .catch(error => {
                showToast('注册失败: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '注册';
            });
        }

        fetch('/api/check_auth')
            .then(response => response.json())
            .then(data => {
                if (data.logged_in) {
                    window.location.href = '/';
                }
            });
    </script>
</body>
</html>
